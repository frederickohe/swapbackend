services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: swapproadmin
      POSTGRES_PASSWORD: swappro098
      POSTGRES_DB: swappro
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    container_name: swapproredis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --requirepass swappro098
    environment:
      REDIS_PASSWORD: swappro098
    volumes:
      - redis_data:/data
  
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: swappro_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@useswappro.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-swappro098}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  backend:
    build: .
    command: python main.py
    volumes:
      - .:/app
    environment:
      SQLALCHEMY_DATABASE_URL: postgresql://swapproadmin:swappro098@db:5432/swappro
      REDIS_HOST: redis-1
      REDIS_PORT: 6379
      JWT_SECRET_KEY: green-secret-keeps-gamma
      JWT_ALGORITHM: HS256
      DEBUG: true
      DB_ECHO: true
      DB_HOST: ent_core_user_db
      DB_PORT: 5432
      DB_USER: user_admin
      DB_PASSWORD: changeme321
      DB_DATABASE: ent_core_db
      MULTI_TENANT: false
      APP_PORT: 3090
    restart: always
    depends_on:
      - db
      - redis
    ports:
      - "3090:3090"

volumes:
  redis_data:
  postgres_data:
  pgadmin_data:
    driver: local
