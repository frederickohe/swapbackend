services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: swapproadmin
      POSTGRES_PASSWORD: swappro098
      POSTGRES_DB: swappro
    # No host port — avoids conflict with existing Postgres on :5432.
    # Backend/pgAdmin reach this service as `db:5432` on the compose network.
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - swappro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swapproadmin -d swappro"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:latest
    container_name: swapproredis
    restart: always
    # Internal only; use "6380:6379" if you need host access to this Redis.
    command: redis-server --requirepass swappro098
    environment:
      REDIS_PASSWORD: swappro098
    volumes:
      - redis_data:/data
    networks:
      - swappro

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: swappro_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@useswappro.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-swappro098}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5051:80"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - swappro
      - caddy

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: swappro_backend
    restart: unless-stopped
    working_dir: /app
    command: bash startup.sh
    volumes:
      - .:/app
    environment:
      # PostgreSQL Environment Variables (for config.py)
      PGHOST: ${PGHOST:-db}
      PGPORT: ${PGPORT:-5432}
      PGUSER: ${PGUSER:-swapproadmin}
      PGPASSWORD: ${PGPASSWORD:-swappro098}
      PGDATABASE: ${PGDATABASE:-swappro}
      
      # SQLAlchemy Database URL (legacy support)
      SQLALCHEMY_DATABASE_URL: "postgresql://swapproadmin:swappro098@db:5432/swappro"
      
      # Redis Configuration
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-swappro098}
      
      # JWT Configuration
      SECRET_KEY: ${SECRET_KEY:-green-secret-keeps-gamma}
      ALGORITHM: ${ALGORITHM:-HS256}
      KID: ${KID:-swappro-kid}
      
      # Application Configuration
      DEBUG: ${DEBUG:-false}
      DB_ECHO: ${DB_ECHO:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      
      # Message Queue Configuration (if needed)
      RABBIT_MQ_URL: ${RABBIT_MQ_URL:-}
      RABBIT_MQ_ROUTING_KEY: ${RABBIT_MQ_ROUTING_KEY:-}
      RABBIT_MQ_AUDIT_QUEUE: ${RABBIT_MQ_AUDIT_QUEUE:-}
      SMS_MQ_QUEUE: ${SMS_MQ_QUEUE:-}
      EMAIL_MQ_QUEUE: ${EMAIL_MQ_QUEUE:-}
      BATCH_CUSTOMER_UPLOAD_QUEUE: ${BATCH_CUSTOMER_UPLOAD_QUEUE:-}
      COMPANY_QUEUE: ${COMPANY_QUEUE:-}

      # SMS / Payments (Moolre default; Wirepick/Paystack legacy)
      SMS_PROVIDER: ${SMS_PROVIDER:-moolre}
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-moolre}
      MOOLRE_API_URL: ${MOOLRE_API_URL:-https://sandbox.moolre.com}
      MOOLRE_API_USER: ${MOOLRE_API_USER:-}
      MOOLRE_API_KEY: ${MOOLRE_API_KEY:-}
      MOOLRE_API_PUBKEY: ${MOOLRE_API_PUBKEY:-}
      MOOLRE_VAS_KEY: ${MOOLRE_VAS_KEY:-}
      MOOLRE_ACCOUNT_NUMBER: ${MOOLRE_ACCOUNT_NUMBER:-}
      MOOLRE_SENDER_ID: ${MOOLRE_SENDER_ID:-swappro}
      MOOLRE_CALLBACK_URL: ${MOOLRE_CALLBACK_URL:-}
      MOOLRE_MERCHANT_CODE: ${MOOLRE_MERCHANT_CODE:-}
      MOOLRE_USSD_SHORT_CODE: ${MOOLRE_USSD_SHORT_CODE:-*920*48#}
      MOOLRE_DEFAULT_CHANNEL: ${MOOLRE_DEFAULT_CHANNEL:-13}
      WIREPICK_API_URL: "https://api.wirepick.com/httpsms"
      WIREPICK_PUBLIC_KEY: ${WIREPICK_PUBLIC_KEY:-8YyJoInAPwhngnjbD_5u5y2kC0CCvPnMk_F0cKLE3vc}
      WIREPICK_SENDER_ID: ${WIREPICK_SENDER_ID:-swappro}
      USE_WIREPICK_API_KEY: ${USE_WIREPICK_API_KEY:-true}
      
      # Frontend and Other URLs
      BASE_FRONTEND_URL: ${BASE_FRONTEND_URL:-http://localhost:3000}
      
      # OTP Configuration
      OTP_EXPIRE_MINUTES: ${OTP_EXPIRE_MINUTES:-5}
      
      # Auto Migration Flag
      AUTO_MIGRATE: ${AUTO_MIGRATE:-true}

      CONTABO_ACCESS_KEY: ${CONTABO_ACCESS_KEY:-e59e33a21a72b214bfc6aeb3e2fcd711}
      CONTABO_SECRET_KEY: ${CONTABO_SECRET_KEY:-939a59165a7490c08e78311d26182118}
      CONTABO_BUCKET: ${CONTABO_BUCKET:-swappro}
      CONTABO_ENDPOINT: ${CONTABO_ENDPOINT:-https://usc1.contabostorage.com}

      # Flat swap transaction fee in GHS for testing (default 1). Set to "" to use TRANSACTION_FEE_PERCENT.
      TRANSACTION_FEE_FIXED_GHS: ${TRANSACTION_FEE_FIXED_GHS:-1}

    depends_on:
      - db
      - redis
    extra_hosts:
      # Ensure `host.docker.internal` resolves on Linux engines too.
      - "host.docker.internal:host-gateway"
    ports:
      - "3090:3090"
    networks:
      - swappro
      - caddy

networks:
  swappro:
    name: swappro-network
    driver: bridge
  caddy:
    external: true
    name: caddy

volumes:
  redis_data:
  postgres_data:
  pgadmin_data:
    driver: local
